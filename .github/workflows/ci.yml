name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # Skip Electron download in the baseline install step; we only need
          # typecheck + lint + vitest here. The package step below pulls Electron.
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + contract + integration tests
        run: npm run test

      # No-eval / dynamic-require gate (constitutional Non-negotiable #4). This
      # runs as a grep instead of relying on ESLint alone so it catches anything
      # that slips past lint rule disables.
      - name: Forbid eval / dynamic code
        shell: bash
        run: |
          if grep -R --include="*.ts" --include="*.tsx" -nE "(^|[^a-zA-Z_])(eval\s*\(|new\s+Function\s*\(|require\s*\(\s*[\`\"'][^\`\"']*\$\{)" src/; then
            echo "::error::Forbidden dynamic-code construct found under src/"
            exit 1
          fi

      - name: Forbid committed .js in src/
        shell: bash
        run: |
          if git ls-files 'src/**/*.js' | head -n 1 | grep -q .; then
            echo "::error::A .js file is committed under src/; use .ts/.tsx only."
            git ls-files 'src/**/*.js'
            exit 1
          fi

      # Build + UI tests only run once there is actual source to build. Per
      # constitution §Governance → "Continuous integration gate", we prefer
      # skipping a step over letting it fail under continue-on-error
      # indefinitely. `src/main/bootstrap.ts` is the Phase 2 Foundational
      # entry point; its existence is the signal that there is something
      # worth building and UI-testing.
      - name: Detect whether source exists to build
        id: source-check
        shell: bash
        run: |
          if [ -f "src/main/bootstrap.ts" ]; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "::notice::src/main/bootstrap.ts not present yet; skipping build and UI smoke tests until Phase 2 lands the entry point."
          fi

      - name: Build Electron app (for UI tests)
        if: steps.source-check.outputs.has_source == 'true'
        run: npm run build

      - name: Install Playwright browsers
        if: steps.source-check.outputs.has_source == 'true'
        run: npx playwright install chromium

      - name: UI smoke tests
        if: steps.source-check.outputs.has_source == 'true'
        run: npm run test:ui
